name: Code Migration

on:
  push:
    branches:
      - {{SOURCE_BRANCH}}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: migration-${{ github.run_id }}
  cancel-in-progress: true

env:
  SOURCE_LANGUAGE: {{SOURCE_LANG}}
  TARGET_LANGUAGE: {{TARGET_LANG}}
  TARGET_BRANCH: {{TARGET_BRANCH}}

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GROQ API key
        run: |
          echo "Fetching GROQ API key..."

          HTTP_STATUS=$(curl -s -o /tmp/key.txt -w "%{http_code}" \
            "https://codegenx.phylon.in/api/secrets/ci?migration_id=${{ github.run_id }}")

          KEY=$(cat /tmp/key.txt)

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "Failed to retrieve API key"
            exit 1
          fi

          echo "::add-mask::$KEY"
          echo "GROQ_API_KEY=$KEY" >> $GITHUB_ENV

          echo "[INFO] API key loaded"

      - name: Run migration script
        run: python scripts/migrate.py

      - name: Commit converted code
        run: |
          git config user.name "codegenx-bot"
          git config user.email "bot@codegenx.ai"

          TARGET="${{ env.TARGET_BRANCH }}"

          git checkout -B "$TARGET"

          if [ -d "converted-code" ]; then
            cp -r converted-code/* .
          fi

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Code migration result"
          git push origin "$TARGET" --force